name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  UV_VERSION: "0.11.29"

jobs:
  lint-format:
    name: lint-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: {python-version: "3.11", cache: ""}
      - run: python -m pip install "uv==$UV_VERSION"
      - run: uv sync --directory backend --frozen --extra dev
      - run: uv run --directory backend ruff format --check src tests
      - run: uv run --directory backend ruff check src tests

  type-check:
    name: type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: {python-version: "3.11", cache: ""}
      - run: python -m pip install "uv==$UV_VERSION"
      - run: uv sync --directory backend --frozen --extra dev
      - run: uv run --directory backend pyright src

  test:
    name: test-python-${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix: {python: ["3.11", "3.13"]}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: {python-version: "${{ matrix.python }}", cache: ""}
      - run: python -m pip install "uv==$UV_VERSION"
      - run: uv sync --directory backend --frozen --extra dev
      - run: uv run --directory backend pytest tests --cov=src --cov-fail-under=80

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: {python-version: "3.11", cache: ""}
      - run: python tools/check_docs.py

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: {fetch-depth: 0}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: {python-version: "3.11", cache: ""}
      - run: python -m pip install "uv==$UV_VERSION"
      - run: uv sync --directory backend --frozen --extra dev
      - run: uv run --directory backend detect-secrets-hook --baseline ../.secrets.baseline $(git ls-files)
      - run: uv run --directory backend bandit -c pyproject.toml -r src
      - run: uv export --directory backend --frozen --no-dev --no-emit-project --output-file /tmp/addobserver-requirements.txt
      - run: uv run --directory backend pip-audit --requirement /tmp/addobserver-requirements.txt

  migrations:
    name: migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: {python-version: "3.11", cache: ""}
      - run: python -m pip install "uv==$UV_VERSION"
      - run: uv sync --directory backend --frozen --extra dev
      - run: uv run --directory backend python -m unittest discover -s tests -p test_sqlalchemy_schema.py -v
